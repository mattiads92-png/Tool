<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinPe Light & Diet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'slide-down': 'slideDown 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #ffffff; }
        .font-cursive { font-family: 'Dancing Script', cursive; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .stagger-1 { animation-delay: 50ms; }
        .stagger-2 { animation-delay: 100ms; }
    </style>
</head>
<body class="text-slate-800 h-[100dvh] w-full flex flex-col items-center justify-center overflow-hidden relative bg-white text-base">

    <div id="auth-screen" class="w-full h-full px-6 flex flex-col items-center text-center z-50 absolute inset-0 justify-center bg-white transition-all duration-500">
        <img src="MLogo.webp" alt="Logo" class="w-28 h-28 rounded-3xl shadow-lg mb-6 object-cover bg-white animate-fade-in-up">
        <h1 class="font-black text-5xl mb-12 text-slate-950 animate-fade-in-up tracking-tight">
            FinPe <span class="font-cursive text-gray-400 font-bold lowercase">light</span>
        </h1>
        <input type="password" id="pin-input" class="w-full max-w-sm text-center text-4xl tracking-[0.5em] py-5 rounded-2xl border border-slate-200 mb-6 outline-none focus:ring-4 focus:ring-blue-500/10 text-slate-950" maxlength="4" placeholder="••••" inputmode="numeric">
        <button id="btn-verify-pin" class="w-full max-w-sm py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg active:scale-95">Sblocca App</button>
    </div>

    <div id="app-screen" class="hidden w-full h-full flex-col max-w-md md:max-w-3xl mx-auto relative bg-white overflow-hidden border-x border-slate-100">
        
        <header class="p-5 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <img src="MLogo.webp" alt="Logo" class="w-10 h-10 rounded-xl shadow-md">
                <h2 id="main-title" class="font-black text-2xl tracking-tight text-slate-950">
                    FinPe <span class="font-cursive text-gray-400 text-3xl lowercase">light</span>
                </h2>
            </div>
            <button onclick="toggleSettings()" class="w-11 h-11 rounded-full bg-white shadow-md border border-slate-100 flex items-center justify-center active:scale-90"><i class="fas fa-cog"></i></button>
        </header>
        
        <main id="section-finances" class="flex-1 overflow-y-auto pb-32 hide-scrollbar bg-slate-50/50 w-full">
            <div class="p-4 space-y-6">
                <div class="flex justify-between items-center bg-white p-5 rounded-3xl shadow-lg border border-slate-100">
                    <button onclick="changeCycle(-1)" class="w-12 h-12 rounded-full border border-slate-100 flex items-center justify-center shadow-sm"><i class="fas fa-chevron-left"></i></button>
                    <div class="text-center">
                        <div class="text-xs font-bold text-gray-400 uppercase">Periodo</div>
                        <div id="cycle-label" class="font-black text-slate-950 text-xl">...</div>
                    </div>
                    <button onclick="changeCycle(1)" class="w-12 h-12 rounded-full border border-slate-100 flex items-center justify-center shadow-sm"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100 text-center">
                        <div class="text-xs font-bold text-red-600 uppercase mb-2">Da Pagare</div>
                        <div id="cycle-pending" class="text-3xl font-black text-red-600">€ 0.00</div>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100 text-center">
                        <div class="text-xs font-bold text-gray-500 uppercase mb-2">Pagate</div>
                        <div id="cycle-paid" class="text-3xl font-black text-slate-950">€ 0.00</div>
                    </div>
                </div>
                <div id="cycle-list" class="space-y-4"></div>
            </div>
            <button onclick="openExpenseModal()" class="fixed bottom-24 right-6 w-16 h-16 bg-blue-600 text-white rounded-2xl shadow-lg flex items-center justify-center text-2xl z-20 active:scale-95"><i class="fas fa-plus"></i></button>
        </main>

        <main id="section-diet" class="hidden flex-1 overflow-y-auto pb-32 hide-scrollbar bg-slate-50/50 w-full">
            <div class="p-4 space-y-6">
                <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100 text-center">
                    <div id="diet-date" class="font-black text-slate-950 text-xl capitalize">...</div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Integratori</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="toggleSupp('d3')" id="btn-d3" class="flex flex-col items-center p-3 rounded-2xl border border-slate-100 transition-all bg-slate-50">
                            <i class="fas fa-sun mb-1 text-orange-400"></i>
                            <span class="text-[10px] font-bold">Vit. D3</span>
                        </button>
                        <button onclick="toggleSupp('antio1')" id="btn-antio1" class="flex flex-col items-center p-3 rounded-2xl border border-slate-100 transition-all bg-slate-50">
                            <i class="fas fa-shield-halved mb-1 text-blue-400"></i>
                            <span class="text-[10px] font-bold">Antio 1</span>
                        </button>
                        <button onclick="toggleSupp('antio2')" id="btn-antio2" class="flex flex-col items-center p-3 rounded-2xl border border-slate-100 transition-all bg-slate-50">
                            <i class="fas fa-leaf mb-1 text-green-400"></i>
                            <span class="text-[10px] font-bold">Antio 2</span>
                        </button>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100 flex items-center justify-between">
                    <div>
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Idratazione</h3>
                        <div class="text-2xl font-black text-blue-600"><span id="water-val">0</span> Bicchieri</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updateWater(-1)" class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center active:scale-90"><i class="fas fa-minus text-slate-400"></i></button>
                        <button onclick="updateWater(1)" class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center active:scale-90 shadow-md"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <div id="diet-logs" class="space-y-4"></div>
            </div>
            <button onclick="openDietModal()" class="fixed bottom-24 right-6 w-16 h-16 bg-emerald-600 text-white rounded-2xl shadow-lg flex items-center justify-center text-2xl z-20 active:scale-95"><i class="fas fa-utensils"></i></button>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 h-20 flex items-center justify-around px-6 z-30">
            <button onclick="switchTab('finances')" id="nav-finances" class="flex flex-col items-center gap-1 text-blue-600">
                <i class="fas fa-wallet text-xl"></i>
                <span class="text-[10px] font-bold uppercase">Spese</span>
            </button>
            <button onclick="switchTab('diet')" id="nav-diet" class="flex flex-col items-center gap-1 text-slate-300">
                <i class="fas fa-apple-whole text-xl"></i>
                <span class="text-[10px] font-bold uppercase">Dieta</span>
            </button>
        </nav>

        <div id="diet-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4 transition-opacity opacity-0 duration-300">
            <div class="bg-white rounded-[2rem] p-6 shadow-2xl w-full max-w-md border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-2xl text-slate-950">Nuovo Pasto</h3>
                    <button onclick="closeDietModal()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center"><i class="fas fa-times"></i></button>
                </div>
                <div class="space-y-4">
                    <select id="diet-meal-type" class="w-full p-4 rounded-2xl border border-slate-200 bg-slate-50 font-bold" onchange="loadDietTips()">
                        <option value="Colazione">Colazione</option>
                        <option value="Spuntino">Spuntino</option>
                        <option value="Pranzo">Pranzo</option>
                        <option value="Cena">Cena</option>
                    </select>
                    <div id="diet-tips" class="flex flex-wrap gap-2 text-xs"></div>
                    <textarea id="diet-meal-desc" class="w-full p-4 rounded-2xl border border-slate-200 h-32 outline-none focus:border-emerald-500 font-medium" placeholder="Cosa hai mangiato?"></textarea>
                    <button onclick="saveDietLog()" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl active:scale-95 shadow-lg">Salva Pasto</button>
                </div>
            </div>
        </div>

        <div id="settings-panel" class="absolute inset-0 bg-white z-40 hidden flex-col transition-colors duration-500">
            <header class="p-5 border-b border-slate-100 flex items-center gap-4">
                <button onclick="toggleSettings()" class="w-11 h-11 rounded-full bg-white shadow-md border border-slate-100 flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
                <h2 class="font-black text-2xl tracking-tight text-slate-950">Impostazioni</h2>
            </header>
            <div class="p-6 flex-1 flex flex-col justify-end pb-12">
                <button onclick="lockApp()" class="w-full py-4 bg-slate-950 text-white font-bold rounded-2xl shadow-xl flex items-center justify-center gap-3 text-lg">
                    <i class="fas fa-lock"></i> Blocca App
                </button>
            </div>
        </div>

        <div id="expense-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden flex-col items-center justify-center p-4 transition-opacity opacity-0 duration-300">
            <div id="expense-modal-content" class="bg-white rounded-[2rem] p-6 shadow-2xl w-full max-w-md flex flex-col transition-all duration-300 border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="modal-title" class="font-black text-3xl tracking-tight text-slate-950">Nuova</h3>
                    <button onclick="closeExpenseModal()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center"><i class="fas fa-times"></i></button>
                </div>
                <input type="hidden" id="exp-id">
                <div class="space-y-5 overflow-y-auto hide-scrollbar flex-1 pr-1">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 block">Descrizione</label>
                        <input type="text" id="exp-desc" class="w-full p-4 rounded-2xl border border-slate-200 font-bold outline-none focus:border-blue-500" placeholder="Es. Bollo Auto">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 block">Importo (€)</label>
                        <input type="number" id="exp-amount" step="0.01" class="w-full p-4 rounded-2xl border border-slate-200 font-black text-3xl text-blue-600 outline-none focus:border-blue-500" placeholder="0.00">
                    </div>
                    <div class="grid grid-cols-2 gap-2 bg-slate-50 p-1.5 rounded-2xl">
                        <button id="btn-type-exact" onclick="setExpDateType('exact')" class="py-2.5 text-sm font-bold rounded-xl bg-white shadow-md text-blue-600 border border-slate-100">Data Esatta</button>
                        <button id="btn-type-month" onclick="setExpDateType('month')" class="py-2.5 text-sm font-bold rounded-xl text-gray-500">Solo Mese</button>
                    </div>
                    <div>
                        <input type="date" id="exp-date-exact" class="w-full p-4 rounded-2xl border border-slate-200 font-bold outline-none">
                        <input type="month" id="exp-date-month" class="w-full p-4 rounded-2xl border border-slate-200 font-bold hidden outline-none">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <label class="text-xs font-bold text-gray-500 uppercase block mb-2">Ripeti ogni...</label>
                        <div class="flex gap-2">
                            <input type="number" id="exp-recurrence-val" min="1" value="1" class="hidden w-20 p-3 rounded-xl border border-slate-200 text-center font-bold">
                            <select id="exp-recurrence-type" class="p-3 rounded-xl border border-slate-200 font-bold flex-1" onchange="toggleRecurrenceValue()">
                                <option value="none">Nessuna ricorrenza</option>
                                <option value="d">Giorno/i</option>
                                <option value="m">Mese/i</option>
                                <option value="y">Anno/i</option>
                            </select>
                        </div>
                    </div>
                    <label class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border border-slate-100 cursor-pointer">
                        <span class="font-bold">Stato: <span class="text-gray-400 font-normal">Già Pagata?</span></span>
                        <input type="checkbox" id="exp-status" class="w-6 h-6 rounded-lg text-blue-600 shadow-inner">
                    </label>
                </div>
                <div class="flex gap-3 pt-5 mt-2 border-t border-slate-100">
                    <button id="btn-delete" onclick="deleteExpense()" class="hidden px-5 py-4 bg-red-50 text-red-600 rounded-2xl"><i class="fas fa-trash"></i></button>
                    <button onclick="saveExpense()" class="flex-1 py-4 bg-slate-950 text-white font-bold rounded-2xl shadow-xl text-lg">Salva</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBJo5E4GjwNw9qyS30_4mHHGpo4ve5nErE",
            authDomain: "finpe-385e6.firebaseapp.com",
            projectId: "finpe-385e6",
            storageBucket: "finpe-385e6.firebasestorage.app",
            messagingSenderId: "977985288512",
            appId: "1:977985288512:web:3d0e0d0857bfb28c8f22a5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const APP_PIN = "4036";
        const FB_EMAIL = "mattiads92@gmail.com";
        const FB_PASS = "-273.15m";

        let expenses = [];
        let dietLogs = [];
        let dailyStats = { water: 0, d3: false, antio1: false, antio2: false };
        let currentCycleDate = new Date();
        let currentExpDateType = 'exact';
        let currentTab = 'finances';

        // DIET CONSTANTS FROM IMAGES
        const DIET_TIPS = {
            "Colazione": ["Pane Semintegrale Tostato", "Salmone Affumicato", "Bresaola", "Olio e Sale", "Caffè", "The Verde/Kukicha"],
            "Spuntino": ["Mela", "Ananas fresco", "4-5 Fragole", "4-5 Qumquat"],
            "Pranzo": ["Pollo/Tacchino", "Merluzzo/Nasello", "Pesce Persico", "Sogliola", "Verdura (Iceberg/Zucchine)"],
            "Cena": ["Salmone fresco", "Coda di Rospo", "Orata/Spigola", "Seppie/Calamari", "Verdura Abbondante"]
        };

        // NAVIGATION LOGIC
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('section-finances').classList.toggle('hidden', tab !== 'finances');
            document.getElementById('section-diet').classList.toggle('hidden', tab !== 'diet');
            
            const nFin = document.getElementById('nav-finances');
            const nDie = document.getElementById('nav-diet');
            const title = document.getElementById('main-title');

            if(tab === 'finances') {
                nFin.classList.replace('text-slate-300', 'text-blue-600');
                nDie.classList.replace('text-emerald-600', 'text-slate-300');
                title.innerHTML = `FinPe <span class="font-cursive text-gray-400 text-3xl lowercase">light</span>`;
            } else {
                nDie.classList.replace('text-slate-300', 'text-emerald-600');
                nFin.classList.replace('text-blue-600', 'text-slate-300');
                title.innerHTML = `Diet <span class="font-cursive text-gray-400 text-3xl lowercase">light</span>`;
                renderDiet();
            }
        }

        // AUTH LOGIC
        document.getElementById('btn-verify-pin').addEventListener('click', unlockWithPin);
        document.getElementById('pin-input').addEventListener('keypress', e => { if (e.key === 'Enter') unlockWithPin(); });

        function unlockWithPin() {
            if(document.getElementById('pin-input').value === APP_PIN) {
                document.getElementById('auth-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-screen').classList.add('hidden');
                    doBackgroundLogin();
                }, 300);
            } else { alert("PIN Errato!"); }
        }

        async function doBackgroundLogin() {
            try {
                await auth.signInWithEmailAndPassword(FB_EMAIL, FB_PASS);
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('flex');
                initApp();
            } catch (error) { alert("Errore Accesso Database"); }
        }

        function lockApp() {
            location.reload();
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.classList.toggle('hidden'); p.classList.toggle('flex');
        }

        // INIT DATA
        function initApp() {
            const uid = auth.currentUser.uid;
            const todayStr = new Date().toISOString().split('T')[0];

            // Finances Listener
            db.collection('users').doc(uid).collection('expenses_light').onSnapshot(snap => {
                expenses = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderCycle();
            });

            // Daily Stats Listener (Water/Supps)
            db.collection('users').doc(uid).collection('daily_stats').doc(todayStr).onSnapshot(doc => {
                if(doc.exists) dailyStats = doc.data();
                else dailyStats = { water: 0, d3: false, antio1: false, antio2: false };
                updateDietUI();
            });

            // Meals Listener
            db.collection('users').doc(uid).collection('diet_logs')
                .where('date', '==', todayStr)
                .orderBy('timestamp', 'asc')
                .onSnapshot(snap => {
                    dietLogs = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    renderDietLogs();
                });
        }

        // DIET FUNCTIONS
        function renderDiet() {
            document.getElementById('diet-date').textContent = new Date().toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        function updateDietUI() {
            document.getElementById('water-val').textContent = dailyStats.water;
            const toggleUI = (id, active, colorClass) => {
                const btn = document.getElementById(id);
                if(active) btn.className = `flex flex-col items-center p-3 rounded-2xl border-2 transition-all bg-white shadow-md ${colorClass}`;
                else btn.className = `flex flex-col items-center p-3 rounded-2xl border border-slate-100 transition-all bg-slate-50`;
            };
            toggleUI('btn-d3', dailyStats.d3, 'border-orange-400');
            toggleUI('btn-antio1', dailyStats.antio1, 'border-blue-400');
            toggleUI('btn-antio2', dailyStats.antio2, 'border-green-400');
        }

        async function updateWater(val) {
            const todayStr = new Date().toISOString().split('T')[0];
            const newVal = Math.max(0, dailyStats.water + val);
            await db.collection('users').doc(auth.currentUser.uid).collection('daily_stats').doc(todayStr).set({ ...dailyStats, water: newVal }, {merge: true});
        }

        async function toggleSupp(key) {
            const todayStr = new Date().toISOString().split('T')[0];
            await db.collection('users').doc(auth.currentUser.uid).collection('daily_stats').doc(todayStr).set({ ...dailyStats, [key]: !dailyStats[key] }, {merge: true});
        }

        function openDietModal() {
            const m = document.getElementById('diet-modal');
            m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => m.classList.replace('opacity-0', 'opacity-100'), 10);
            loadDietTips();
        }

        function closeDietModal() {
            const m = document.getElementById('diet-modal');
            m.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
            document.getElementById('diet-meal-desc').value = '';
        }

        function loadDietTips() {
            const type = document.getElementById('diet-meal-type').value;
            const container = document.getElementById('diet-tips');
            container.innerHTML = '';
            DIET_TIPS[type].forEach(tip => {
                const span = document.createElement('button');
                span.className = "px-2 py-1 bg-slate-100 rounded-lg text-slate-500 font-bold active:scale-95";
                span.textContent = "+ " + tip;
                span.onclick = () => {
                    const txt = document.getElementById('diet-meal-desc');
                    txt.value += (txt.value ? ', ' : '') + tip;
                }
                container.appendChild(span);
            });
        }

        async function saveDietLog() {
            const type = document.getElementById('diet-meal-type').value;
            const desc = document.getElementById('diet-meal-desc').value;
            if(!desc) return alert("Inserisci cosa hai mangiato");

            await db.collection('users').doc(auth.currentUser.uid).collection('diet_logs').add({
                meal: type,
                notes: desc,
                date: new Date().toISOString().split('T')[0],
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeDietModal();
        }

        function renderDietLogs() {
            const container = document.getElementById('diet-logs');
            container.innerHTML = dietLogs.length ? '' : '<p class="text-center text-gray-400 py-10">Nessun pasto oggi</p>';
            dietLogs.forEach(log => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-3xl shadow-md border border-slate-100 flex items-start justify-between";
                div.innerHTML = `
                    <div>
                        <div class="text-[10px] font-black uppercase text-emerald-600 mb-1">${log.meal}</div>
                        <div class="font-bold text-slate-900">${log.notes}</div>
                    </div>
                    <button onclick="deleteDietLog('${log.id}')" class="text-slate-200 p-2"><i class="fas fa-times"></i></button>
                `;
                container.appendChild(div);
            });
        }

        async function deleteDietLog(id) {
            if(confirm("Cancella questo pasto?")) await db.collection('users').doc(auth.currentUser.uid).collection('diet_logs').doc(id).delete();
        }

        // FINANCE FUNCTIONS (ORIGINAL)
        function getCycleDates(refDate) {
            const d = new Date(refDate);
            let start, end;
            if (d.getDate() >= 20) {
                start = new Date(d.getFullYear(), d.getMonth(), 20);
                end = new Date(d.getFullYear(), d.getMonth() + 1, 19);
            } else {
                start = new Date(d.getFullYear(), d.getMonth() - 1, 20);
                end = new Date(d.getFullYear(), d.getMonth(), 19);
            }
            return { 
                startStr: start.toISOString().slice(0,10), 
                endStr: end.toISOString().slice(0,10),
                label: `${start.getDate()} ${start.toLocaleString('it',{month:'short'})} - ${end.getDate()} ${end.toLocaleString('it',{month:'short'})} ${end.getFullYear()}`
            };
        }

        function changeCycle(dir) {
            currentCycleDate.setMonth(currentCycleDate.getMonth() + dir);
            renderCycle();
        }

        function renderCycle() {
            const cycle = getCycleDates(currentCycleDate);
            document.getElementById('cycle-label').textContent = cycle.label;
            let paid = 0, pending = 0;
            const container = document.getElementById('cycle-list');
            container.innerHTML = '';

            const today = new Date().toISOString().slice(0,10);

            expenses.forEach(e => {
                let expDateStr = e.dateType === 'month' ? `${e.date}-01` : e.date;
                if (expDateStr >= cycle.startStr && expDateStr <= cycle.endStr) {
                    if (e.status === 'pending') pending += e.amount;
                    else paid += e.amount;

                    const div = document.createElement('div');
                    div.className = `bg-white p-4 rounded-2xl shadow-md flex items-center gap-4 cursor-pointer border border-slate-50 active:scale-[0.98] transition-all`;
                    div.onclick = () => openExpenseModal(e.id);
                    div.innerHTML = `
                        <div class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded-lg">${e.date.split('-').reverse().slice(0,2).join('/')}</div>
                        <div class="flex-1 font-bold ${e.status === 'paid' ? 'line-through text-slate-400' : ''}">${e.desc}</div>
                        <div class="font-black ${e.status === 'paid' ? 'text-slate-400' : 'text-blue-600'}">€${e.amount.toFixed(2)}</div>
                    `;
                    container.appendChild(div);
                }
            });

            document.getElementById('cycle-paid').textContent = `€ ${paid.toFixed(2)}`;
            document.getElementById('cycle-pending').textContent = `€ ${pending.toFixed(2)}`;
        }

        function setExpDateType(type) {
            currentExpDateType = type;
            document.getElementById('btn-type-exact').className = type === 'exact' ? 'py-2.5 text-sm font-bold rounded-xl bg-white shadow-md text-blue-600 border border-slate-100' : 'py-2.5 text-sm font-bold rounded-xl text-gray-500';
            document.getElementById('btn-type-month').className = type === 'month' ? 'py-2.5 text-sm font-bold rounded-xl bg-white shadow-md text-blue-600 border border-slate-100' : 'py-2.5 text-sm font-bold rounded-xl text-gray-500';
            document.getElementById('exp-date-exact').classList.toggle('hidden', type !== 'exact');
            document.getElementById('exp-date-month').classList.toggle('hidden', type !== 'month');
        }

        function toggleRecurrenceValue() {
            const type = document.getElementById('exp-recurrence-type').value;
            document.getElementById('exp-recurrence-val').classList.toggle('hidden', type === 'none');
        }

        function openExpenseModal(id = null) {
            const m = document.getElementById('expense-modal');
            m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => m.classList.replace('opacity-0', 'opacity-100'), 10);
            
            if(id) {
                const e = expenses.find(x => x.id === id);
                document.getElementById('modal-title').textContent = "Modifica";
                document.getElementById('exp-id').value = e.id;
                document.getElementById('exp-desc').value = e.desc;
                document.getElementById('exp-amount').value = e.amount;
                document.getElementById('exp-status').checked = (e.status === 'paid');
                document.getElementById('btn-delete').classList.remove('hidden');
                setExpDateType(e.dateType || 'exact');
            } else {
                document.getElementById('modal-title').textContent = "Nuova";
                document.getElementById('exp-id').value = '';
                document.getElementById('exp-desc').value = '';
                document.getElementById('exp-amount').value = '';
                document.getElementById('exp-status').checked = false;
                document.getElementById('btn-delete').classList.add('hidden');
            }
        }

        function closeExpenseModal() {
            const m = document.getElementById('expense-modal');
            m.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
        }

        async function saveExpense() {
            const id = document.getElementById('exp-id').value;
            const data = {
                desc: document.getElementById('exp-desc').value,
                amount: parseFloat(document.getElementById('exp-amount').value) || 0,
                status: document.getElementById('exp-status').checked ? 'paid' : 'pending',
                dateType: currentExpDateType,
                date: currentExpDateType === 'exact' ? document.getElementById('exp-date-exact').value : document.getElementById('exp-date-month').value,
                recurrence: document.getElementById('exp-recurrence-type').value === 'none' ? 'none' : document.getElementById('exp-recurrence-val').value + document.getElementById('exp-recurrence-type').value
            };
            if(!data.desc || !data.date) return alert("Compila i campi");
            
            const col = db.collection('users').doc(auth.currentUser.uid).collection('expenses_light');
            if(id) await col.doc(id).update(data);
            else await col.add(data);
            closeExpenseModal();
        }

        async function deleteExpense() {
            if(confirm("Eliminare?")) {
                const id = document.getElementById('exp-id').value;
                await db.collection('users').doc(auth.currentUser.uid).collection('expenses_light').doc(id).delete();
                closeExpenseModal();
            }
        }

    </script>
</body>
</html>
