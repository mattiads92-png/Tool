<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinPe Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'slide-down': 'slideDown 0.5s ease-out forwards',
                        'bounce-slight': 'bounceSlight 2s infinite ease-in-out',
                    },
                    keyframes: {
                        fadeInUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideDown: { '0%': { opacity: '0', transform: 'translateY(-20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        bounceSlight: { '0%, 100%': { transform: 'translateY(-5%)' }, '50%': { transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #ffffff; }
        .font-cursive { font-family: 'Dancing Script', cursive; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 h-[100dvh] w-full flex flex-col items-center justify-center overflow-hidden relative bg-white">

    <div id="auth-screen" class="w-full h-full px-6 flex flex-col items-center text-center z-50 absolute inset-0 justify-center bg-white transition-all duration-500">
        <img src="MLogo.webp" alt="Logo" class="w-28 h-28 rounded-3xl shadow-lg mb-6 object-cover bg-white animate-fade-in-up">
        <h1 class="font-black text-5xl mb-12 text-slate-950 animate-fade-in-up tracking-tight flex items-center justify-center gap-2">
            FinPe <span class="font-cursive text-gray-400 font-bold text-5xl lowercase mt-2">light</span>
        </h1>
        <input type="password" id="pin-input" class="w-full max-w-sm text-center text-4xl tracking-[0.5em] py-5 rounded-2xl border border-slate-200 mb-6 outline-none text-slate-950" maxlength="4" placeholder="••••" inputmode="numeric">
        <button id="btn-verify-pin" class="w-full max-w-sm py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg hover:bg-blue-700 transition active:scale-95 text-lg">Sblocca App</button>
    </div>

    <div id="app-screen" class="hidden w-full h-full flex-col max-w-md md:max-w-3xl mx-auto relative bg-white overflow-hidden border-x border-slate-100">
        
        <header class="p-5 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10 animate-slide-down">
            <div class="flex items-center gap-3">
                <img src="MLogo.webp" alt="Logo" class="w-10 h-10 rounded-xl shadow-md border border-slate-100">
                <h2 id="section-title" class="font-black text-2xl tracking-tight text-slate-950 flex items-center gap-1">
                    FinPe <span class="font-cursive text-gray-400 text-3xl lowercase mt-1">light</span>
                </h2>
            </div>
            <button onclick="toggleSettings()" class="w-11 h-11 rounded-full bg-white shadow-md border border-slate-100 text-slate-600 flex items-center justify-center active:scale-90"><i class="fas fa-cog"></i></button>
        </header>

        <main id="section-finances" class="flex-1 overflow-y-auto relative pb-32 hide-scrollbar bg-slate-50/50 w-full">
            <div class="p-4 sm:p-6 space-y-6 max-w-2xl mx-auto">
                <div class="flex justify-between items-center bg-white p-5 rounded-3xl shadow-lg border border-slate-100">
                    <button onclick="changeCycle(-1)" class="w-12 h-12 rounded-full bg-white text-slate-600 shadow-md flex items-center justify-center border border-slate-100"><i class="fas fa-chevron-left"></i></button>
                    <div class="text-center">
                        <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Periodo Attuale</div>
                        <div id="cycle-label" class="font-black text-slate-950 text-xl tracking-tight">...</div>
                    </div>
                    <button onclick="changeCycle(1)" class="w-12 h-12 rounded-full bg-white text-slate-600 shadow-md flex items-center justify-center border border-slate-100"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100 text-center">
                        <div class="text-xs font-bold text-red-600 uppercase tracking-wider mb-2">Da Pagare</div>
                        <div id="cycle-pending" class="text-3xl font-black text-red-600 tracking-tight">€ 0.00</div>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100 text-center">
                        <div class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Pagate</div>
                        <div id="cycle-paid" class="text-3xl font-black text-slate-950 tracking-tight">€ 0.00</div>
                    </div>
                </div>
                <div id="cycle-list" class="space-y-4 pt-2"></div>
            </div>
            <button onclick="openExpenseModal()" class="fixed bottom-24 right-6 w-16 h-16 bg-blue-600 text-white rounded-2xl shadow-lg flex items-center justify-center text-2xl z-20 animate-bounce-slight border border-white/20">
                <i class="fas fa-plus"></i>
            </button>
        </main>

        <main id="section-diet" class="hidden flex-1 overflow-y-auto relative pb-32 hide-scrollbar bg-slate-50/50 w-full">
            <div class="p-4 sm:p-6 space-y-6 max-w-2xl mx-auto">
                <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100 text-center">
                    <div id="diet-today" class="font-black text-slate-950 text-xl capitalize"></div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <button onclick="toggleSupp('d3')" id="supp-d3" class="p-3 rounded-2xl border bg-white flex flex-col items-center shadow-sm transition-all"><i class="fas fa-capsules text-orange-400 mb-1"></i><span class="text-[10px] font-bold">D3</span></button>
                    <button onclick="toggleSupp('antio1')" id="supp-antio1" class="p-3 rounded-2xl border bg-white flex flex-col items-center shadow-sm transition-all"><i class="fas fa-shield-virus text-blue-400 mb-1"></i><span class="text-[10px] font-bold">Antio 1</span></button>
                    <button onclick="toggleSupp('antio2')" id="supp-antio2" class="p-3 rounded-2xl border bg-white flex flex-col items-center shadow-sm transition-all"><i class="fas fa-leaf text-emerald-400 mb-1"></i><span class="text-[10px] font-bold">Antio 2</span></button>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100 flex items-center justify-between">
                    <div>
                        <h3 class="text-xs font-bold text-gray-400 uppercase">Idratazione</h3>
                        <div class="text-2xl font-black text-blue-600 tracking-tight"><span id="water-liters">0.00</span> L</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="addWater(-250)" class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center font-bold text-xs">-250ml</button>
                        <button onclick="addWater(250)" class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center shadow-md font-bold text-xs">+250ml</button>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Pasti di oggi</h3>
                    <div id="diet-logs-container" class="space-y-3"></div>
                </div>
            </div>
            <button onclick="openDietModal()" class="fixed bottom-24 right-6 w-16 h-16 bg-emerald-600 text-white rounded-2xl shadow-lg flex items-center justify-center text-2xl z-20 active:scale-95 border border-white/20">
                <i class="fas fa-utensils"></i>
            </button>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 h-20 flex items-center justify-around px-6 z-30 shadow-lg">
            <button onclick="switchTab('finances')" id="tab-finances" class="flex flex-col items-center gap-1 text-blue-600 transition-all">
                <i class="fas fa-wallet text-xl"></i><span class="text-[10px] font-bold uppercase">Finanze</span>
            </button>
            <button onclick="switchTab('diet')" id="tab-diet" class="flex flex-col items-center gap-1 text-slate-400 transition-all">
                <i class="fas fa-apple-whole text-xl"></i><span class="text-[10px] font-bold uppercase">Dieta</span>
            </button>
        </nav>

        <div id="diet-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] hidden flex-col items-center justify-center p-4 transition-opacity opacity-0 duration-300">
            <div class="bg-white rounded-[2rem] p-6 shadow-2xl w-full max-w-md border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-2xl text-slate-950">Registra Pasto</h3>
                    <button onclick="closeDietModal()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center"><i class="fas fa-times"></i></button>
                </div>
                <div class="space-y-4">
                    <select id="diet-type" class="w-full p-4 rounded-2xl border border-slate-200 bg-slate-50 font-bold" onchange="updateFoodSelect()">
                        <option value="Colazione">Colazione</option>
                        <option value="Spuntino">Spuntino</option>
                        <option value="Pranzo">Pranzo</option>
                        <option value="Cena">Cena</option>
                    </select>
                    <select id="diet-food" class="w-full p-4 rounded-2xl border border-slate-200 font-bold"></select>
                    <input type="number" id="diet-grams" class="w-full p-4 rounded-2xl border border-slate-200 font-black text-2xl text-emerald-600" placeholder="gr">
                    <button onclick="saveDietLog()" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl shadow-xl active:scale-95">Salva</button>
                </div>
            </div>
        </div>

        <div id="expense-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden flex-col items-center justify-center p-4 transition-opacity opacity-0 duration-300">
            <div id="expense-modal-content" class="bg-white rounded-[2rem] p-6 shadow-2xl w-full max-w-md flex flex-col modal-container border border-slate-100">
                <div class="flex justify-between items-center mb-6"><h3 id="modal-title" class="font-black text-3xl text-slate-950">Nuova</h3><button onclick="closeExpenseModal()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center"><i class="fas fa-times"></i></button></div>
                <input type="hidden" id="exp-id">
                <div class="space-y-5 overflow-y-auto hide-scrollbar flex-1 pr-1">
                    <input type="text" id="exp-desc" class="w-full p-4 rounded-2xl border border-slate-200 font-bold" placeholder="Descrizione">
                    <input type="number" id="exp-amount" class="w-full p-4 rounded-2xl border border-slate-200 font-black text-3xl text-blue-600" placeholder="0.00">
                    <div class="grid grid-cols-2 gap-2 bg-slate-50 p-1 rounded-2xl">
                        <button id="btn-type-exact" onclick="setExpDateType('exact')" class="py-2 bg-white shadow rounded-xl text-blue-600 font-bold">Data Esatta</button>
                        <button id="btn-type-month" onclick="setExpDateType('month')" class="py-2 text-gray-500 font-bold">Solo Mese</button>
                    </div>
                    <input type="date" id="exp-date-exact" class="w-full p-4 rounded-2xl border border-slate-200 font-bold">
                    <input type="month" id="exp-date-month" class="w-full p-4 rounded-2xl border border-slate-200 font-bold hidden">
                    <select id="exp-recurrence-type" class="w-full p-4 rounded-2xl border border-slate-200 font-bold"><option value="none">Nessuna ricorrenza</option><option value="m">Mese/i</option></select>
                    <label class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border cursor-pointer"><span class="font-bold">Pagata?</span><input type="checkbox" id="exp-status" class="w-6 h-6"></label>
                </div>
                <div class="flex gap-3 pt-5 mt-2 border-t"><button onclick="deleteExpense()" class="px-5 py-4 bg-red-50 text-red-600 rounded-2xl"><i class="fas fa-trash"></i></button><button onclick="saveExpense()" class="flex-1 py-4 bg-slate-950 text-white font-bold rounded-2xl shadow-xl">Salva</button></div>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBJo5E4GjwNw9qyS30_4mHHGpo4ve5nErE",
            authDomain: "finpe-385e6.firebaseapp.com",
            projectId: "finpe-385e6",
            storageBucket: "finpe-385e6.firebasestorage.app",
            messagingSenderId: "977985288512",
            appId: "1:977985288512:web:3d0e0d0857bfb28c8f22a5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const APP_PIN = "4036";
        const FB_EMAIL = "mattiads92@gmail.com";
        const FB_PASS = "-273.15m";

        let expenses = [];
        let dietLogs = [];
        let dailyStats = { water: 0, d3: false, antio1: false, antio2: false };
        let currentCycleDate = new Date();
        let currentExpDateType = 'exact';

        const FOODS = {
            "Colazione": ["Pane Semintegrale Tostato", "Salmone Affumicato", "Bresaola", "Olio e Sale", "Caffè", "The Verde"],
            "Spuntino": ["Mela", "Ananas", "Fragole", "Qumquat"],
            "Pranzo": ["Pollo", "Tacchino", "Merluzzo", "Nasello", "Sogliola", "Pasta", "Riso"],
            "Cena": ["Salmone fresco", "Coda di Rospo", "Spigola", "Calamari", "Seppie", "Vongole"]
        };

        document.getElementById('btn-verify-pin').addEventListener('click', () => {
            if(document.getElementById('pin-input').value === APP_PIN) {
                document.getElementById('auth-screen').classList.add('hidden');
                auth.signInWithEmailAndPassword(FB_EMAIL, FB_PASS).then(init);
            } else { alert("PIN Errato"); }
        });

        function switchTab(tab) {
            document.getElementById('section-finances').classList.toggle('hidden', tab !== 'finances');
            document.getElementById('section-diet').classList.toggle('hidden', tab !== 'diet');
            document.getElementById('tab-finances').className = tab === 'finances' ? "flex flex-col items-center gap-1 text-blue-600 transition-all" : "flex flex-col items-center gap-1 text-slate-400";
            document.getElementById('tab-diet').className = tab === 'diet' ? "flex flex-col items-center gap-1 text-emerald-600 transition-all" : "flex flex-col items-center gap-1 text-slate-400";
            document.getElementById('section-title').innerHTML = tab === 'finances' ? `FinPe <span class="font-cursive text-gray-400 text-3xl lowercase">light</span>` : `Diet <span class="font-cursive text-gray-400 text-3xl lowercase">light</span>`;
        }

        function init() {
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('flex');
            const uid = auth.currentUser.uid;
            const todayStr = new Date().toISOString().split('T')[0];

            db.collection('users').doc(uid).collection('expenses_light').onSnapshot(s => {
                expenses = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderCycle();
            });

            db.collection('users').doc(uid).collection('daily_stats').doc(todayStr).onSnapshot(d => {
                dailyStats = d.exists ? d.data() : { water: 0, d3: false, antio1: false, antio2: false };
                updateDietUI();
            });

            db.collection('users').doc(uid).collection('diet_logs').where('date', '==', todayStr).orderBy('timestamp', 'asc').onSnapshot(s => {
                dietLogs = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderDietLogs();
            });
            document.getElementById('diet-today').textContent = new Date().toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        // FINANZE - ORDINAMENTO RICHIESTO (DA PAGARE IN CIMA)
        function renderCycle() {
            const cycle = getCycleDates(currentCycleDate);
            document.getElementById('cycle-label').textContent = cycle.label;
            let paidTotal = 0, pendingTotal = 0;
            const container = document.getElementById('cycle-list');
            container.innerHTML = '';

            const items = expenses.filter(e => {
                let d = e.dateType === 'month' ? `${e.date}-01` : e.date;
                return d >= cycle.startStr && d <= cycle.endStr;
            });

            // LOGICA RICHIESTA: Da pagare in alto, poi le pagate
            items.sort((a, b) => {
                if (a.status === b.status) return a.date > b.date ? 1 : -1;
                return a.status === 'pending' ? -1 : 1;
            });

            items.forEach(e => {
                if (e.status === 'pending') pendingTotal += e.amount; else paidTotal += e.amount;
                const div = document.createElement('div');
                div.className = `bg-white p-4 rounded-2xl shadow-lg border border-slate-100 flex items-center justify-between cursor-pointer ${e.status === 'paid' ? 'opacity-50' : ''}`;
                div.onclick = () => openExpenseModal(e.id);
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded-lg">${e.date.split('-').reverse().slice(0,2).join('/')}</div>
                        <div class="font-bold ${e.status === 'paid' ? 'line-through' : ''}">${e.desc}</div>
                    </div>
                    <div class="font-black text-xl ${e.status === 'paid' ? '' : 'text-blue-600'}">€ ${e.amount.toFixed(2)}</div>
                `;
                container.appendChild(div);
            });
            document.getElementById('cycle-pending').textContent = `€ ${pendingTotal.toFixed(2)}`;
            document.getElementById('cycle-paid').textContent = `€ ${paidTotal.toFixed(2)}`;
        }

        // DIETA - VISUALIZZAZIONE PASTI SOTTO
        function renderDietLogs() {
            const c = document.getElementById('diet-logs-container');
            c.innerHTML = dietLogs.length ? '' : '<p class="text-center text-gray-400 py-4">Nessun pasto registrato oggi.</p>';
            dietLogs.forEach(l => {
                const d = document.createElement('div');
                d.className = "bg-slate-50 p-4 rounded-2xl flex items-center justify-between border border-slate-100";
                d.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black uppercase text-emerald-600 tracking-widest">${l.meal}</span>
                        <span class="font-bold text-slate-800">${l.notes}</span>
                    </div>
                    <button onclick="deleteDietLog('${l.id}')" class="text-slate-300 hover:text-red-400"><i class="fas fa-trash-can"></i></button>
                `;
                c.appendChild(d);
            });
        }

        async function saveDietLog() {
            const meal = document.getElementById('diet-type').value;
            const food = document.getElementById('diet-food').value;
            const gr = document.getElementById('diet-grams').value;
            if(!gr) return alert("Inserisci i grammi");
            await db.collection('users').doc(auth.currentUser.uid).collection('diet_logs').add({
                meal, notes: `${food} (${gr}gr)`, date: new Date().toISOString().split('T')[0], timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeDietModal();
        }

        // Helpers Funzioni Originali e Nuove
        function getCycleDates(ref) {
            const d = new Date(ref);
            let s, e;
            if (d.getDate() >= 20) { s = new Date(d.getFullYear(), d.getMonth(), 20); e = new Date(d.getFullYear(), d.getMonth() + 1, 19); }
            else { s = new Date(d.getFullYear(), d.getMonth() - 1, 20); e = new Date(d.getFullYear(), d.getMonth(), 19); }
            return { startStr: s.toISOString().slice(0,10), endStr: e.toISOString().slice(0,10), label: `${s.getDate()} ${s.toLocaleString('it',{month:'short'})} - ${e.getDate()} ${e.toLocaleString('it',{month:'short'})} ${e.getFullYear()}` };
        }
        function changeCycle(v) { currentCycleDate.setMonth(currentCycleDate.getMonth() + v); renderCycle(); }
        function updateDietUI() {
            document.getElementById('water-liters').textContent = (dailyStats.water/1000).toFixed(2);
            ['d3','antio1','antio2'].forEach(k => { document.getElementById('supp-'+k).className = dailyStats[k] ? "p-3 rounded-2xl border-2 border-emerald-400 bg-emerald-50 flex flex-col items-center shadow-md" : "p-3 rounded-2xl border bg-white flex flex-col items-center shadow-sm"; });
        }
        async function addWater(ml) { await db.collection('users').doc(auth.currentUser.uid).collection('daily_stats').doc(new Date().toISOString().split('T')[0]).set({ ...dailyStats, water: Math.max(0, dailyStats.water+ml) }, {merge:true}); }
        async function toggleSupp(k) { await db.collection('users').doc(auth.currentUser.uid).collection('daily_stats').doc(new Date().toISOString().split('T')[0]).set({ ...dailyStats, [k]: !dailyStats[k] }, {merge:true}); }
        function updateFoodSelect() { const s = document.getElementById('diet-food'); s.innerHTML = ''; FOODS[document.getElementById('diet-type').value].forEach(f => { const o = document.createElement('option'); o.value=f; o.textContent=f; s.appendChild(o); }); }
        function openDietModal() { document.getElementById('diet-modal').classList.remove('hidden'); document.getElementById('diet-modal').classList.add('flex'); setTimeout(()=>document.getElementById('diet-modal').classList.replace('opacity-0','opacity-100'),10); updateFoodSelect(); }
        function closeDietModal() { document.getElementById('diet-modal').classList.replace('opacity-100','opacity-0'); setTimeout(()=>document.getElementById('diet-modal').classList.add('hidden'),300); }
        async function deleteDietLog(id) { if(confirm("Eliminare pasto?")) await db.collection('users').doc(auth.currentUser.uid).collection('diet_logs').doc(id).delete(); }
        function setExpDateType(t) { currentExpDateType=t; document.getElementById('btn-type-exact').className = t==='exact' ? 'py-2 bg-white shadow rounded-xl text-blue-600 font-bold' : 'py-2 text-gray-500 font-bold'; document.getElementById('btn-type-month').className = t==='month' ? 'py-2 bg-white shadow rounded-xl text-blue-600 font-bold' : 'py-2 text-gray-500 font-bold'; document.getElementById('exp-date-exact').classList.toggle('hidden', t!=='exact'); document.getElementById('exp-date-month').classList.toggle('hidden', t!=='month'); }
        function openExpenseModal(id=null) { 
            const m = document.getElementById('expense-modal'); m.classList.remove('hidden'); m.classList.add('flex');
            if(id) { const e = expenses.find(x=>x.id===id); document.getElementById('exp-id').value=e.id; document.getElementById('exp-desc').value=e.desc; document.getElementById('exp-amount').value=e.amount; document.getElementById('exp-status').checked=e.status==='paid'; setExpDateType(e.dateType||'exact'); }
            else { document.getElementById('exp-id').value=''; document.getElementById('exp-desc').value=''; document.getElementById('exp-amount').value=''; document.getElementById('exp-status').checked=false; }
        }
        function closeExpenseModal() { document.getElementById('expense-modal').classList.add('hidden'); }
        async function saveExpense() {
            const id = document.getElementById('exp-id').value;
            const data = { desc: document.getElementById('exp-desc').value, amount: parseFloat(document.getElementById('exp-amount').value), status: document.getElementById('exp-status').checked?'paid':'pending', dateType: currentExpDateType, date: currentExpDateType==='exact'?document.getElementById('exp-date-exact').value:document.getElementById('exp-date-month').value };
            const col = db.collection('users').doc(auth.currentUser.uid).collection('expenses_light');
            if(id) await col.doc(id).update(data); else await col.add(data);
            closeExpenseModal();
        }
        async function deleteExpense() { if(confirm("Eliminare?")) await db.collection('users').doc(auth.currentUser.uid).collection('expenses_light').doc(document.getElementById('exp-id').value).delete(); closeExpenseModal(); }
    </script>
</body>
</html>
